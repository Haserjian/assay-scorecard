name: Weekly Scorecard Scan

on:
  push:
    branches:
      - main
    paths:
      - 'site/**'
      - '.github/workflows/scan.yml'
  schedule:
    # Every Sunday at 02:00 UTC
    - cron: '0 2 * * 0'
  workflow_dispatch:
    inputs:
      limit:
        description: 'Limit to first N repos (for testing)'
        required: false
        type: number

permissions:
  contents: write
  pull-requests: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  scan:
    if: github.event_name != 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install assay-ai==1.6.0 pyyaml
          assay version

      - name: Run scorecard scan
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -n "${{ inputs.limit }}" ]; then
            python scan.py --limit ${{ inputs.limit }}
          else
            python scan.py
          fi

      - name: Build site
        run: python build_site.py

      - name: Open or update scorecard PR
        id: update-pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          UPDATE_DATE="$(date -u +%Y-%m-%d)"
          BRANCH="scorecard/update-${UPDATE_DATE}"
          TITLE="scorecard: update ${UPDATE_DATE}"
          BODY="Scheduled Assay scorecard update generated by CI.

          Review the data diff before merging. Pages deploys from main after this PR is merged."

          git config user.name "Assay Scorecard Bot"
          git config user.email "scorecard@assay.ai"
          git checkout -B "$BRANCH"
          git add site/

          if git diff --staged --quiet; then
            echo "No scorecard changes to publish."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git commit -m "$TITLE"
          git fetch origin "refs/heads/$BRANCH:refs/remotes/origin/$BRANCH" || true
          git push --force-with-lease origin "HEAD:$BRANCH"

          PR_NUMBER="$(gh pr list --head "$BRANCH" --state open --json number --jq '.[0].number // ""')"
          if [ -n "$PR_NUMBER" ]; then
            gh pr edit "$PR_NUMBER" --title "$TITLE" --body "$BODY" --base main
            echo "Updated PR #$PR_NUMBER"
          else
            gh pr create --title "$TITLE" --body "$BODY" --base main --head "$BRANCH"
          fi
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Upload generated scorecard artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scorecard-site
          path: site/
          retention-days: 14

  deploy:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
      contents: read
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
